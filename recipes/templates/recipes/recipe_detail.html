{% extends 'recipes/base.html' %}

{% block content %}

<h1>{{ recipe.title }}</h1>

<p>by {{ recipe.author.username }}</p>

<img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">

<h2>Description</h2>
<p>{{ recipe.description }}</p>

<h2>Ingredients</h2>
<p>{{ recipe.ingredients }}</p>

<h2>Instructions</h2>
<p>{{ recipe.instructions }}</p>

{% endblock %}

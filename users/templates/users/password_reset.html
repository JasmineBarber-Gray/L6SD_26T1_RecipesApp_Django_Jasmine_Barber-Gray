{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h2>Reset Your Password</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            {{ form.email.label_tag }}
            {{ form.email }}
        </div>

        <button type="submit">Send Reset Link</button>
    </form>

    <p class="auth-link">
        <a href="{% url 'Login' %}">Back to login</a>
    </p>
</div>
{% endblock %}

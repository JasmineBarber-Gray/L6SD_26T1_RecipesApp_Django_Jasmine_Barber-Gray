{% extends "base.html" %}

{% block content %}

<div class="auth-container">
    <h2>Create Your Account</h2>
    <form method="post">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Sign Up</button>
    </form>
    
    <p>Already have an account? <a href="{% url 'Login' %}">Login here</a>.</p>
</div>

{% endblock %}
